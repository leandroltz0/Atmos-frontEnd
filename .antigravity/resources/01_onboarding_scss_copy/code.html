<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ATMOS - Onboarding</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Outfit:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<style>
        :root {
            --surface-tint: #7bd0ff;
            --tertiary-container: #f1a02b;
            --on-primary-fixed: #001e2c;
            --secondary-container: #3e495d;
            --background: #0f1418;
            --on-tertiary: #472a00;
            --outline: #87929a;
            --on-error-container: #ffdad6;
            --inverse-primary: #00668a;
            --surface-container-highest: #303539;
            --primary-fixed: #c4e7ff;
            --outline-variant: #3e484f;
            --secondary-fixed-dim: #bcc7de;
            --on-background: #dee3e8;
            --surface-container: #1b2024;
            --on-error: #690005;
            --on-primary-fixed-variant: #004c69;
            --surface-variant: #303539;
            --surface-container-lowest: #0a0f12;
            --on-secondary-fixed-variant: #3c475a;
            --tertiary-fixed-dim: #ffb960;
            --secondary: #bcc7de;
            --inverse-surface: #dee3e8;
            --error-container: #93000a;
            --surface: #0f1418;
            --on-tertiary-fixed: #2a1700;
            --on-primary: #00354a;
            --surface-bright: #343a3e;
            --on-tertiary-fixed-variant: #653e00;
            --on-surface: #dee3e8;
            --tertiary: #ffc176;
            --on-surface-variant: #bdc8d1;
            --on-secondary-fixed: #111c2d;
            --on-tertiary-container: #613b00;
            --on-secondary: #263143;
            --error: #ffb4ab;
            --inverse-on-surface: #2c3135;
            --on-primary-container: #004965;
            --secondary-fixed: #d8e3fb;
            --primary-container: #38bdf8;
            --surface-dim: #0f1418;
            --surface-container-high: #252b2e;
            --on-secondary-container: #aeb9d0;
            --primary-fixed-dim: #7bd0ff;
            --surface-container-low: #171c20;
            --tertiary-fixed: #ffddb8;
            --primary: #8ed5ff;
            --brand-bg: #0F172A;
            
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --spacing-container: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--background);
            color: var(--on-background);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: max(884px, 100dvh);
            margin: 0;
        }

        .main-container {
            width: 100%;
            max-width: 390px;
            height: 844px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-color: var(--brand-bg);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .noise-bg {
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.025;
            pointer-events: none;
        }

        .gradient-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(56, 189, 248, 0.2), rgba(15, 23, 42, 0.8), #0F172A);
            pointer-events: none;
        }

        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            opacity: 0.8;
        }
        .star-container {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .header {
            width: 100%;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding-top: 3rem;
        }
        .header-title {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 0.1em;
            color: white;
            text-transform: uppercase;
            font-family: 'Outfit', sans-serif;
        }

        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 var(--spacing-container);
            z-index: 10;
            position: relative;
        }

        .hero-graphic {
            position: relative;
            width: 12rem;
            height: 12rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 3rem;
        }

        .halo-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            fill: none;
            stroke: currentColor;
            color: rgba(56, 189, 248, 0.4);
        }
        .halo-svg-inner {
            position: absolute;
            inset: 1rem;
            width: calc(100% - 2rem);
            height: calc(100% - 2rem);
            fill: none;
            stroke: currentColor;
            color: rgba(196, 231, 255, 0.3);
        }

        .core-pin {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 6rem;
            height: 6rem;
            border-radius: 9999px;
            background-color: rgba(15, 20, 24, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(56, 189, 248, 0.3);
        }
        .core-pin-icon {
            font-size: 48px;
            color: var(--primary-container);
            font-variation-settings: 'FILL' 1;
        }
        .core-pin-glow {
            position: absolute;
            inset: 0;
            border-radius: 9999px;
            background-color: rgba(56, 189, 248, 0.2);
            filter: blur(12px);
            z-index: -1;
        }

        .text-structure {
            text-align: center;
            width: 100%;
            max-width: 320px;
            margin-bottom: 4rem;
            position: relative;
        }

        .heading {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            line-height: 40px;
            letter-spacing: -0.02em;
            font-weight: 700;
            color: white;
            margin-bottom: var(--spacing-sm);
        }

        .subheading {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            line-height: 18px;
            font-weight: 400;
            color: var(--on-surface-variant);
            padding: 0 var(--spacing-sm);
        }

        .action-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg);
            padding: 0 var(--spacing-xs);
        }

        .btn-primary {
            width: 100%;
            background-color: var(--primary-container);
            color: var(--on-primary-container);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 500;
            padding: 14px 0;
            border-radius: 9999px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(56, 189, 248, 0.3);
            transition: background-color 0.2s;
        }
        .btn-primary:hover {
            background-color: var(--primary-fixed);
        }

        .btn-secondary {
            width: 100%;
            background-color: transparent;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 500;
            padding: 14px 0;
            border-radius: 9999px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .footer {
            width: 100%;
            padding-bottom: 2rem;
            padding-top: 1rem;
            padding-left: var(--spacing-container);
            padding-right: var(--spacing-container);
            display: flex;
            justify-content: center;
            z-index: 10;
        }
        .footer-text {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            color: rgba(189, 200, 209, 0.6); /* on-surface-variant with opacity */
        }
    </style>
</head>
<body>
<main class="main-container">
<!-- Background Effects -->
<div class="noise-bg"></div>
<div class="gradient-bg"></div>
<!-- Simple Starry Background -->
<div class="star-container">
<div class="star" style="width: 4px; height: 4px; top: 10%; left: 20%; opacity: 0.4;"></div>
<div class="star" style="width: 2px; height: 2px; top: 15%; left: 80%; opacity: 0.6;"></div>
<div class="star" style="width: 6px; height: 6px; top: 25%; left: 10%; opacity: 0.3;"></div>
<div class="star" style="width: 3px; height: 3px; top: 30%; left: 70%; opacity: 0.8;"></div>
<div class="star" style="width: 4px; height: 4px; top: 45%; left: 85%; opacity: 0.5;"></div>
<div class="star" style="width: 2px; height: 2px; top: 50%; left: 15%; opacity: 0.7;"></div>
<div class="star" style="width: 3px; height: 3px; top: 60%; left: 60%; opacity: 0.4;"></div>
<div class="star" style="width: 4px; height: 4px; top: 70%; left: 30%; opacity: 0.6;"></div>
<div class="star" style="width: 2px; height: 2px; top: 80%; left: 80%; opacity: 0.3;"></div>
<div class="star" style="width: 3px; height: 3px; top: 85%; left: 20%; opacity: 0.5;"></div>
</div>
<!-- TopAppBar -->
<header class="header">
<span class="header-title">ATMOS</span>
</header>
<!-- Main Content Area -->
<div class="content-area">
<!-- Hero Graphic: Hand-crafted Navigation Artifact -->
<div class="hero-graphic">
<!-- Broken Halo Rings -->
<svg class="halo-svg" stroke-width="1.5" viewbox="0 0 100 100">
<path d="M 50,5 A 45,45 0 0,1 90,30"></path>
<path d="M 95,50 A 45,45 0 0,1 60,92"></path>
<path d="M 40,94 A 45,45 0 0,1 5,60"></path>
<path d="M 8,30 A 45,45 0 0,1 30,10"></path>
</svg>
<svg class="halo-svg-inner" stroke-width="1" viewbox="0 0 100 100">
<path d="M 50,15 A 35,35 0 0,0 20,30"></path>
<path d="M 12,50 A 35,35 0 0,0 35,80"></path>
<path d="M 70,82 A 35,35 0 0,0 85,50"></path>
<path d="M 82,30 A 35,35 0 0,0 60,18"></path>
</svg>
<!-- Core Pin -->
<div class="core-pin">
<span class="material-symbols-outlined core-pin-icon">
                    location_on
                </span>
<div class="core-pin-glow"></div>
</div>
</div>
<!-- Typography Structure -->
<div class="text-structure">
<h1 class="heading">
                Know your sky, instantly
            </h1>
<p class="subheading">
                ATMOS uses your location to deliver real-time, hyper-local weather.
            </p>
</div>
<!-- Action Area -->
<div class="action-area">
<button class="btn-primary">
                Allow location access
            </button>
<button class="btn-secondary">
                Search for a city instead
            </button>
</div>
</div>
<!-- Footer -->
<footer class="footer">
<p class="footer-text">
            Location is used only for weather data.
        </p>
</footer>
</main>
</body></html>
