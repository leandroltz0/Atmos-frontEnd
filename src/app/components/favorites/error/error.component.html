<div class="favorites-error" role="alert" aria-live="assertive">
  <div class="favorites-error__icon-shell" aria-hidden="true">
    <svg viewBox="0 0 64 64" fill="none" class="favorites-error__icon">
      <circle cx="32" cy="32" r="24" stroke="currentColor" stroke-width="2" opacity="0.2"/>
      <path d="M32 20v14M32 40v2" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
  </div>
  <p class="favorites-error__title">Ocurrió un error</p>
  <p class="favorites-error__body">{{ errorMessage() }}</p>
  <div class="favorites-error__actions">
    <button mat-flat-button type="button" class="favorites-primary-btn" (click)="onRetry()">
      Reintentar
    </button>
    <button mat-stroked-button type="button" class="favorites-secondary-btn" (click)="onRestoreDemo()">
      Restaurar demo
    </button>
  </div>
</div>
