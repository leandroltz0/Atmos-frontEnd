<section class="profile-stats" aria-label="Estadísticas de uso">
  @for (stat of stats(); track stat.id) {
    <div class="profile-stat" [class]="'profile-stat--' + stat.tone">
      <div class="profile-stat__icon-wrap" [class]="'profile-stat__icon-wrap--' + stat.tone">
        @switch (stat.icon) {
          @case ('heart') {
            <svg viewBox="0 0 24 24" fill="none" class="profile-stat__svg" aria-hidden="true">
              <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          }
          @case ('bell') {
            <svg viewBox="0 0 24 24" fill="none" class="profile-stat__svg" aria-hidden="true">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          }
          @case ('activity') {
            <svg viewBox="0 0 24 24" fill="none" class="profile-stat__svg" aria-hidden="true">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          }
        }
      </div>
      <span class="profile-stat__value font-mono">{{ stat.value }}</span>
      <span class="profile-stat__label">{{ stat.label }}</span>
    </div>
  }
</section>
