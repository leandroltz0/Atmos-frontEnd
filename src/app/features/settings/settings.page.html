<main class="settings-shell font-body" role="main" [attr.aria-busy]="isLoading()">
  <app-settings-background />

  <div class="settings-container">
    <app-settings-header
      [appVersion]="appVersion()"
      (goBack)="onGoBack()"
    />

    <div class="settings-groups">
      @for (group of groups(); track group.id) {
        <app-settings-group
          [group]="group"
          (toggleChanged)="onToggleChanged($event.groupId, $event.itemId, $event.checked)"
          (selectChanged)="onSelectChanged($event.groupId, $event.itemId, $event.value)"
          (actionClicked)="onActionClicked($event.groupId, $event.itemId)"
        />
      }
    </div>

    <app-settings-footer [appVersion]="appVersion()" />
  </div>
</main>
